# Local development stack for the Hotel Diagnostic Platform (feature 003).
# Per quickstart.md §2: Postgres 16 for relational + jsonb + materialized views;
# Redis 7 for BullMQ; MinIO as a local S3 stand-in for Scaleway Object Storage.
#
# Production targets France/EU residency (Clever Cloud or Scaleway). This file
# is for local-dev only — credentials below are NOT used in any deployed env.
#
# Usage:
#   docker compose -f audit/infra/dev/docker-compose.yml up -d
#   docker compose -f audit/infra/dev/docker-compose.yml down -v
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rinzler_audit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit_dev_only
      POSTGRES_DB: audit
    ports:
      # Host port 55432 to avoid clashing with local Postgres instances
      # already listening on 5432 and 5433. Container port stays 5432.
      - "55432:5432"
    volumes:
      - audit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rinzler_audit_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - audit_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: rinzler_audit_minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: audit_minio
      MINIO_ROOT_PASSWORD: audit_minio_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - audit_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  audit_pg_data:
  audit_redis_data:
  audit_minio_data:
