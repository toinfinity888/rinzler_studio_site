# Each entry is intentionally terse on long fields (strengths / limitations /
# when-to-recommend / when-not-to) — the team's content workstream will fill
# them in via the admin UI. The seed bootstraps category coverage and core
# decision-relevant fields (target sizes, languages, GDPR posture, EU hosting,
# implementation complexity, price tier, French-market relevance).
